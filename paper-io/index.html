<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="圈地大冒险">
  <meta name="theme-color" content="#ff8a3d">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>圈地大冒险</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="hud-top">
      <div id="pct-wrap">
        <div id="pct">0.0%</div>
        <div id="best-small">最高 0.0%</div>
      </div>
    </div>
    <ul id="leaderboard"></ul>
    <canvas id="minimap" width="132" height="132"></canvas>
    <button id="btn-pause" class="icon-btn" aria-label="暂停">⏸</button>
    <div id="toasts"></div>
  </div>

  <!-- 开始界面 -->
  <div id="start-screen" class="overlay">
    <div class="logo">
      <span class="logo-word">圈地</span><span class="logo-word accent">大冒险</span>
    </div>
    <div class="subtitle">圈住越多地盘越厉害！</div>
    <div class="best-line">🏆 最高纪录 <b id="best-menu">0.0%</b></div>
    <div class="skin-title">选择你的小车</div>
    <div id="skin-list"></div>
    <button id="btn-start" class="big-btn">开始游戏</button>
    <div class="menu-row">
      <button id="btn-mute" class="small-btn">🔊 音效开</button>
      <button id="btn-bgm" class="small-btn">🎶 音乐开</button>
    </div>
  </div>

  <!-- 暂停 -->
  <div id="pause-screen" class="overlay hidden">
    <div class="panel">
      <h2>暂停</h2>
      <button id="btn-resume" class="big-btn">继续</button>
      <button id="pause-mute" class="small-btn">🔊 音效开</button>
      <button id="btn-menu" class="small-btn">回主菜单</button>
    </div>
  </div>

  <!-- 复活 -->
  <div id="revive-panel" class="overlay hidden">
    <div class="panel">
      <h2>被切断了！</h2>
      <p class="revive-tip">免费复活一次，保留你的地盘</p>
      <button id="btn-revive" class="big-btn revive-btn">
        复活 <span id="revive-count">5</span>
      </button>
      <button id="btn-giveup" class="small-btn">放弃</button>
    </div>
  </div>

  <!-- 结算 -->
  <div id="death-screen" class="overlay hidden">
    <div class="panel">
      <div id="death-record" class="record-badge hidden">NEW RECORD!</div>
      <h2>本局结算</h2>
      <div class="stat-row"><span>占领</span><b id="death-pct">0.0%</b></div>
      <div class="stat-row"><span>击杀</span><b id="death-kills">0</b></div>
      <div class="stat-row"><span>存活</span><b id="death-time">0:00</b></div>
      <div class="stat-row"><span>最高</span><b id="death-best">0.0%</b></div>
      <p id="death-enc" class="enc">再来一局一定行！</p>
      <button id="btn-replay" class="big-btn">再来一局</button>
    </div>
  </div>

  <!-- 胜利 -->
  <div id="victory-screen" class="overlay hidden">
    <div class="panel">
      <h2 class="win-title">🎉 你统治了整个世界！</h2>
      <p class="enc">100% 全部拿下，太强啦！</p>
      <button id="btn-continue-win" class="big-btn">继续游玩</button>
      <button id="btn-replay2" class="small-btn">再来一局</button>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
