<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Popsicle Land">
  <meta name="theme-color" content="#ff8a3d">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Popsicle Land</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/meta.css">
</head>
<body>
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="hud-top">
      <div id="pct-wrap">
        <div id="pct">0.0%</div>
        <div id="best-small">Best 0.0%</div>
      </div>
    </div>
    <ul id="leaderboard"></ul>
    <canvas id="minimap" width="132" height="132"></canvas>
    <button id="btn-pause" class="icon-btn" data-i18n-aria="hud.pauseAria" aria-label="Pause">⏸</button>
    <div id="toasts"></div>
  </div>

  <!-- 开始界面 / Start screen -->
  <div id="start-screen" class="overlay">
    <button id="btn-lang" class="lang-btn" data-i18n="menu.langToggle" data-i18n-aria="menu.langAria" aria-label="Switch language">中文</button>
    <div class="logo">
      <span class="logo-word" data-i18n="logo.part1">Popsicle</span><span class="logo-word accent" data-i18n="logo.part2">Land</span>
    </div>
    <div class="subtitle" data-i18n="subtitle">The more land you grab, the cooler you are!</div>
    <div id="birthday-banner" class="birthday-banner hidden"></div>
    <div class="meta-wallet">
      <div class="wallet-coins">🪙 <b id="wallet-coins">0</b></div>
      <button id="rank-badge" class="rank-badge" data-i18n-aria="hud.rankAria" aria-label="Rank"></button>
    </div>
    <div class="best-line">🏆 <span data-i18n="menu.best">Best Record</span> <b id="best-menu">0.0%</b></div>
    <div class="skin-title" data-i18n="menu.chooseSkin">Pick your racer</div>
    <div id="skin-list"></div>
    <button id="btn-start" class="big-btn" data-i18n="menu.start">Play</button>
    <div class="menu-row">
      <button id="btn-collection" class="small-btn meta-dot-wrap"><span data-i18n="menu.collection">🎁 Collection</span><span id="coll-dot" class="hidden"></span></button>
      <button id="btn-daily" class="small-btn daily-btn hidden" data-i18n="menu.daily">🎁 Daily Gift</button>
    </div>
    <div class="menu-row">
      <button id="btn-mute" class="small-btn">🔊 Sound On</button>
      <button id="btn-bgm" class="small-btn">🎶 Music On</button>
    </div>
  </div>

  <!-- 暂停 / Pause -->
  <div id="pause-screen" class="overlay hidden">
    <div class="panel">
      <h2 data-i18n="pause.title">Paused</h2>
      <button id="btn-resume" class="big-btn" data-i18n="pause.resume">Resume</button>
      <button id="pause-mute" class="small-btn">🔊 Sound On</button>
      <button id="btn-menu" class="small-btn" data-i18n="pause.menu">Main Menu</button>
    </div>
  </div>

  <!-- 复活 / Revive -->
  <div id="revive-panel" class="overlay hidden">
    <div class="panel">
      <h2 data-i18n="revive.title">You got cut off!</h2>
      <p class="revive-tip" data-i18n="revive.tip">Revive once for free, keep your land</p>
      <button id="btn-revive" class="big-btn revive-btn">
        <span data-i18n="revive.revive">Revive</span> <span id="revive-count">5</span>
      </button>
      <button id="btn-giveup" class="small-btn" data-i18n="revive.giveup">Give Up</button>
    </div>
  </div>

  <!-- 赛后结算/胜利由养成层覆盖层（MetaUI.showResults）动态渲染，见 js/meta/meta-ui.js -->

  <script type="module" src="./js/main.js"></script>
</body>
</html>
